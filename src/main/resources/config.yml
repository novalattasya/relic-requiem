# ============================================
# CONFIG RELIC REQUIEM
# Maintainer and Developer: novalattasya
# ============================================
# Semua setting gameplay plugin ada di sini.
# Ngatur meteor, relic, drop, message, dll.
# Default config ini udah balance.

# ============================================
# WORLD SETTINGS
# ============================================
world:
  # Ukuran world border
  # 8000 = area dari -4000 sampai 4000
  border-size: 8000


# ============================================
# SISTEM METEOR
# ============================================
meteor:
  # Interval meteor spawn otomatis (dalam jam)
  spawn-interval-hours: 3

  # Radius area spawn meteor dari titik 0,0
  spawn-radius: 2000

  # Radius crater meteor
  crater-radius: 3

  # Offset armor stand biar visual meteor gak ngaco di Bedrock
  armor-stand-y-offset: -2.27

  # Scale armor stand buat visual meteor
  armor-stand-scale: 1.62


# ============================================
# SISTEM EKSTRAKSI ORE
# ============================================
ore-extraction:
  # Lama ekstraksi worldheart ore
  # 330 ticks = 82.5 detik
  duration-ticks: 330

  # Radius pencarian armor stand saat ore dihancurkan
  destruction-search-radius: 4.0


# ============================================
# DROP CHANCE MYTHIC MOBS
# ============================================
# Peluang Dominion Core drop dari tiap mob
# Value dari 0.0 - 1.0
# Mob yang gak ada di list = 0% drop

drop-chances:
  # Tier 1: Boss utama
  skeletonking: 0.80

  # Tier 2: Mini boss / HP gede
  angrysludge: 0.40
  staticallychargedsheep: 0.20

  # Tier 3: Elite mob
  skeletalknight: 0.15

  # Tier 4: Mob biasa / minion
  skeletalminion: 0.005


# ============================================
# CUSTOM ITEM
# ============================================
items:
  fallen-soul:
    name: "Fallen Soul"
    lore:
      - "Setiap jiwa yang jatuh tidak pernah benar-benar hilang,"
      - "mereka menjadi bahan bakar bagi perang berikutnya."

  worldheart-gem:
    name: "Worldheart Gem"
    lore:
      - "Jantung dunia yang telah mengeras,"
      - "dibentuk oleh ribuan peperangan."

  dominion-core:
    name: "Dominion Core"
    lore:
      - "Kekuatan untuk menguasai tidak diwariskan,"
      - "melainkan direbut dari kekacauan."

  worldheart-ore:
    name: "Worldheart Ore"
    lore:
      - "Meteor yang membawa kekuatan"
      - "untuk mengubah takdir dunia."

  relic:
    name: "The Worldheart Relic"
    lore:
      - "Artefak yang menentukan"
      - "nasib seluruh dunia."
      - "Hanya satu yang layak menguasainya!"


# ============================================
# MESSAGE GAMEPLAY
# ============================================
messages:

  # ============================================
  # PROTEKSI RELIC
  # ============================================
  relic-protection:

    # Pas player coba buang relic
    drop-blocked: "§c[!] Relic telah terikat dengan jiwamu. Item ini tidak dapat dibuang!"

    # Pas player coba masukin relic ke storage lain
    storage-blocked: "§c[!] Relic hanya dapat disimpan di inventory pemain!"

    # Pas non-op pake command admin
    insufficient-permissions: "§cKamu tidak memiliki izin untuk melakukan ini."


  # ============================================
  # CRAFTING & AWAKENING RELIC
  # ============================================
  relic-crafting:

    # Pas relic berhasil dibuat
    success: "§aRelic berhasil dibuat."

    # Pas material awakening di-generate
    materials-generated: "§aMaterial awakening berhasil dibuat."

    # Kalau relic udah pernah di-awaken
    already-awoken: "§c[!] The Worldheart Relic telah dibangkitkan oleh seseorang. Kesempatan ini sudah hilang!"

    # Kalau material kurang
    missing-materials: "§c[!] Kamu membutuhkan Fallen Soul, Worldheart Gem, dan Dominion Core untuk awakening!"

    # Broadcast awakening relic
    awakening-broadcast: "§4§l[PENGUMUMAN] §c%player% telah membangkitkan The Worldheart Relic!"

    # Message personal pas awakening
    awakening-personal: "§d[!] Kekuatan Relic mengalir dalam tubuhmu. Lokasimu sekarang terekspos ke seluruh server!"


  # ============================================
  # SISTEM PvP & KEMATIAN
  # ============================================
  death:

    # Pas relic jatuh karena dibunuh player lain
    relic-dropped: "§4§l[PENGUMUMAN] §c%player% dibunuh oleh %killer%! Relic kini jatuh ke tanah!"

    # Pas mati karena environment/mob sambil pegang relic
    relic-protected: "§d[!] Relic melindungimu dari kehampaan. Item ini akan kembali saat kamu respawn."


  # ============================================
  # EKSTRAKSI ORE
  # ============================================
  ore-extraction:

    # Pas mulai ekstraksi
    started: "§6[⛏] Memulai ekstraksi... Proses ini membutuhkan waktu."

    # Pas ekstraksi batal karena gerak
    cancelled: "§c[✗] Kamu bergerak terlalu jauh! Ekstraksi dibatalkan."

    # Pas ekstraksi selesai
    completed: "§a[✓] Ekstraksi selesai! Kamu mendapatkan Worldheart Gem."

    # Pas tool salah
    wrong-tool: "§c[!] Kamu membutuhkan pickaxe Diamond atau Netherite untuk mengekstrak ore ini!"


  # ============================================
  # ACHIEVEMENT
  # ============================================
  achievements:

    # Pertama kali dapet Fallen Soul
    fallen-soul: "§d§l[ACHIEVEMENT] §e%player% menemukan pecahan jiwa yang telah jatuh... §8[Fallen Soul]"

    # Pertama kali dapet Worldheart Gem
    worldheart-gem: "§d§l[ACHIEVEMENT] §e%player% menggali rahasia inti dunia... §8[Worldheart Gem]"

    # Pertama kali dapet Dominion Core
    dominion-core: "§d§l[ACHIEVEMENT] §e%player% telah merebut kekuatan dominasi! §8[Dominion Core]"


  # ============================================
  # EFEK RELIC
  # ============================================
  relic-effects:

    # Pas holder relic ditandai
    marked: "§4§l[!] AURA RELIC MELEDAK! Lokasimu sekarang ditampilkan sebagai MARKER MERAH di Locator Bar!"


  # ============================================
  # COMMAND ADMIN
  # ============================================
  admin:

    # Pas reload config
    reload-start: "§eReload config Relic Requiem..."
    reload-success: "§a[✓] Config berhasil di-reload!"
    reload-failed: "§c[✗] Gagal reload config. Cek console untuk detail error."

    # Pas spawn meteor
    meteor-spawned: "§aMeteor berhasil di-spawn di dekatmu!"

    # Pas reset status relic
    relic-reset: "§a[!] Status relic server berhasil di-reset."


  # ============================================
  # DEATH BAN
  # ============================================
  death-ban:

    # Pas player kena death ban
    kick: "§cKamu dibanned sementara selama %hours% jam setelah dibunuh oleh %killer%."

    # Pas player banned coba join
    join-kick: "§cKamu masih terkena banned sementara setelah dibunuh oleh %killer%.\n§cSisa waktu: %hours% jam dan %minutes% menit."


# ============================================
# SISTEM DEATH BAN
# ============================================
death-ban:

  # Lama banned sementara setelah dibunuh player
  # Set 0 buat matiin fitur death ban
  duration-hours: 3


# ============================================
# DATA PLAYER KE-BAN
# ============================================
# Section ini diurus otomatis sama plugin.
# Jangan diutak-atik manual kecuali ngerti resikonya 😭
banned-players: {}