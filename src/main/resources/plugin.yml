name: RelicRequiem
version: '1.0.0'
main: com.relicrequiem.plugin.RelicRequiemPlugin
api-version: '1.21'
authors: [Nopal]
description: Relic Requiem RPG Event Plugin

commands:
  getrelic:
    description: Get the Relic item for testing
    usage: /getrelic
    permission: op
  getmaterials:
    description: Get all awakening materials for testing
    usage: /getmaterials
    permission: op
  spawnmeteor:
    description: Force spawn a Worldheart Ore meteor near player
    usage: /spawnmeteor
    permission: op
  resetrelic:
    description: Reset the Relic awakened status
    usage: /resetrelic
    permission: op
  relic:
    description: Relic Requiem admin commands
    usage: /relic <reload>
    permission: op
    subcommands:
      - reload